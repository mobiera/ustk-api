## Library CI: build + test on every push/PR; publish to Maven Central only on
## a merge to main. Other branches / pull requests build only (no publish).

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  MVN_SETTINGS: ${{ secrets.MVN_SETTINGS }}
  GPG_KEY: ${{ secrets.GPG_KEY }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Build (no publish)
        run: |
          echo "${MVN_SETTINGS}" > /tmp/settings.xml
          mvn -B -ntp verify -Dgpg.skip=true -s /tmp/settings.xml
          rm -f /tmp/settings.xml

      - name: Publish to Maven Central
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "${MVN_SETTINGS}" > /tmp/settings.xml
          echo -n "$GPG_KEY" | base64 --decode | gpg --import
          mvn -B -ntp deploy -DskipTests -s /tmp/settings.xml
          rm -f /tmp/settings.xml
          rm -rf /home/runner/.gpg
